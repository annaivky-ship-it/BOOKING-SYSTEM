
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍑</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Flavor Entertainers | Premium Entertainment Booking</title>
    <meta name="description" content="A premium platform to book professional entertainers in Western Australia. Secure, compliant, and professional." />
    
    <!-- PWA Metadata -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#09090b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flavor" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/7Yf9X9M.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-bg: #09090b;
        --color-bg-alt: #121214;
        --color-bg-light: #18181b;
        --color-border: #27272a;
        --color-primary: #f97316;
        --color-primary-hover: #ea580c;
        --color-primary-light: #fb923c;
        --glass-bg: rgba(24, 24, 27, 0.75);
        --glass-border: rgba(255, 255, 255, 0.08);
      }
      
      html {
        scroll-behavior: smooth;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--color-bg);
        color: #d4d4d8;
        font-family: 'Inter', sans-serif;
        background-image: 
          radial-gradient(circle at 50% -20%, rgba(249, 115, 22, 0.12), transparent 50%),
          radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.02) 1px, transparent 0);
        background-size: 100% 1000px, 30px 30px;
        background-attachment: fixed;
        min-height: 100vh;
        /* Safe area support for notched phones */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      
      .font-logo-main { font-family: 'Anton', sans-serif; }
      .font-logo-sub { font-family: 'Special Elite', monospace; }
      h1, h2, h3, h4, .font-heading {
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        color: #fafafa;
        letter-spacing: -0.025em;
      }
      
      /* Modern Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--color-bg); }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 10px;
        border: 2px solid var(--color-bg);
      }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

      /* Glassmorphism utility with smoother blur */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
      }
      
      .card-base {
        background: var(--color-bg-alt);
        border: 1px solid var(--color-border);
        border-radius: 1.5rem;
        padding: 1.5rem;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }
      
      @media (min-width: 768px) {
        .card-base { padding: 2rem; }
      }

      .card-base:hover {
        border-color: rgba(249, 115, 22, 0.3);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 20px rgba(249, 115, 22, 0.05);
        transform: translateY(-4px);
      }
      
      .btn-primary {
        background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));
        color: white;
        font-weight: 800;
        padding: 0.875rem 1.75rem;
        border-radius: 0.875rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-transform: uppercase;
        letter-spacing: 0.075em;
        font-size: 0.8125rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(249, 115, 22, 0.35);
        filter: brightness(1.05);
      }

      .input-base {
        width: 100%;
        background-color: #09090b;
        border: 1px solid #27272a;
        border-radius: 0.875rem;
        padding: 0.875rem 1.25rem;
        color: #fafafa;
        transition: all 0.25s ease;
        font-size: 0.9375rem;
      }

      .input-base:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        background-color: #0c0c0e;
      }

      .input-with-icon { padding-left: 3.25rem; }

      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      /* Custom selection color */
      ::selection {
        background: var(--color-primary);
        color: white;
      }

      /* Hide focus outline for mouse users but keep it for keyboard users */
      :focus:not(:focus-visible) { outline: none; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.11.0",
        "react/": "https://esm.sh/react@^19.1.1/",
        "react": "https://esm.sh/react@^19.1.1",
        "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
        "lucide-react": "https://esm.sh/lucide-react@^0.417.0",
        "recharts": "https://esm.sh/recharts@2.12.7"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
